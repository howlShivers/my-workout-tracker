<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Workout Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #111;
    --bg2: #1a1a1a;
    --bg3: #222;
    --bg4: #2a2a2a;
    --border: #333;
    --border2: #444;
    --text: #f0f0f0;
    --text2: #aaa;
    --text3: #666;
    --accent: #b5f23a;
    --accent-dim: rgba(181,242,58,0.12);
    --accent-text: #111;
    --danger: #e05252;
    --danger-dim: rgba(224,82,82,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Barlow', system-ui, sans-serif; font-size: 16px; line-height: 1.4; overscroll-behavior: none; }
  body { overflow-x: hidden; }
  #app { max-width: 480px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

  /* ── NAV ── */
  .nav { background: var(--bg); border-bottom: 1px solid var(--border); padding: 0 16px; display: flex; align-items: center; gap: 4px; position: sticky; top: 0; z-index: 10; }
  .nav-btn { flex: 1; padding: 14px 4px 12px; background: none; border: none; border-bottom: 2px solid transparent; color: var(--text3); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; transition: color 0.15s; }
  .nav-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── SCREENS ── */
  .screen { flex: 1; padding: 16px; display: none; }
  .screen.active { display: block; }

  /* ── TYPOGRAPHY ── */
  .page-title { font-family: 'Barlow Condensed', sans-serif; font-size: 28px; font-weight: 700; letter-spacing: 0.02em; text-transform: uppercase; margin-bottom: 4px; }
  .page-sub { font-size: 13px; color: var(--text3); margin-bottom: 20px; }

  /* ── WORKOUT DAY CARDS ── */
  .day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; margin-bottom: 10px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.15s, background 0.15s; active: none; }
  .day-card:hover { border-color: var(--border2); }
  .day-card:active { background: var(--bg3); transform: scale(0.99); }
  .day-card-left { flex: 1; min-width: 0; }
  .day-card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 0.03em; text-transform: uppercase; }
  .day-card-exercises { font-size: 12px; color: var(--text3); margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .day-card-meta { font-size: 11px; color: var(--accent); margin-top: 5px; }
  .arrow { color: var(--text3); font-size: 22px; padding-left: 12px; flex-shrink: 0; }

  /* ── ACTIVE WORKOUT ── */
  .workout-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .back-btn { background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 7px 12px; color: var(--text2); font-family: 'Barlow', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; }
  .back-btn:active { background: var(--bg3); }
  .workout-title { font-family: 'Barlow Condensed', sans-serif; font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; flex: 1; }
  .progress-wrap { margin-bottom: 18px; }
  .progress-row { display: flex; justify-content: space-between; margin-bottom: 6px; }
  .progress-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; font-weight: 600; }
  .progress-pct { font-size: 12px; color: var(--accent); font-weight: 600; }
  .progress-bar { height: 3px; background: var(--bg4); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }

  /* ── EXERCISE CARDS ── */
  .ex-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; transition: border-color 0.15s; }
  .ex-card.all-done { border-color: rgba(181,242,58,0.3); }
  .ex-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .ex-card-name { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .done-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); background: var(--accent-dim); padding: 3px 8px; border-radius: 20px; }

  /* ── SET ROWS ── */
  .sets-header { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 8px; margin-bottom: 6px; padding: 0 2px; }
  .sets-header span { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; text-align: center; }
  .set-row { display: grid; grid-template-columns: 32px 1fr 1fr 36px; gap: 8px; align-items: center; margin-bottom: 7px; }
  .set-num { font-size: 12px; color: var(--text3); text-align: center; font-weight: 600; }
  .set-input { width: 100%; padding: 9px 6px; font-size: 17px; text-align: center; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); font-family: 'Barlow', sans-serif; font-weight: 500; outline: none; -moz-appearance: textfield; transition: border-color 0.15s, background 0.15s; }
  .set-input:focus { border-color: var(--accent); background: var(--bg4); }
  .set-input::-webkit-outer-spin-button, .set-input::-webkit-inner-spin-button { -webkit-appearance: none; }
  .set-input.done-input { opacity: 0.4; }
  .check-btn { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--border2); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; transition: all 0.15s; color: var(--text3); flex-shrink: 0; }
  .check-btn:active { transform: scale(0.92); }
  .check-btn.done { background: var(--accent); border-color: var(--accent); color: var(--accent-text); }

  /* ── FINISH BTN ── */
  .finish-btn { width: 100%; padding: 16px; background: var(--accent); border: none; border-radius: var(--radius); color: var(--accent-text); font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer; margin-top: 8px; margin-bottom: 32px; transition: opacity 0.15s, transform 0.1s; }
  .finish-btn:active { transform: scale(0.99); opacity: 0.9; }

  /* ── DONE SCREEN ── */
  .done-hero { text-align: center; padding: 32px 0 24px; }
  .done-icon { font-size: 52px; margin-bottom: 12px; }
  .done-title { font-family: 'Barlow Condensed', sans-serif; font-size: 32px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 4px; }
  .done-sub { font-size: 14px; color: var(--text3); margin-bottom: 0; }
  .summary-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; font-weight: 600; margin: 20px 0 10px; }
  .summary-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; margin-bottom: 8px; }
  .summary-ex-name { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 6px; }
  .summary-sets { display: flex; flex-wrap: wrap; gap: 6px; }
  .summary-set-pill { font-size: 12px; color: var(--text2); background: var(--bg3); padding: 4px 10px; border-radius: 20px; }
  .home-btn { width: 100%; padding: 14px; background: none; border: 1px solid var(--border2); border-radius: var(--radius); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; margin-top: 10px; margin-bottom: 32px; }
  .home-btn:active { background: var(--bg3); }

  /* ── HISTORY ── */
  .history-entry { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .history-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
  .history-day { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .history-date { font-size: 11px; color: var(--text3); text-align: right; line-height: 1.5; }
  .history-ex-row { display: flex; justify-content: space-between; align-items: baseline; padding: 5px 0; border-top: 1px solid var(--border); }
  .history-ex-name { font-size: 13px; color: var(--text2); }
  .history-ex-sets { font-size: 12px; color: var(--text3); text-align: right; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text3); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-text { font-size: 15px; }

  /* ── EDIT PLAN ── */
  .plan-day-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 10px; }
  .plan-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .plan-day-name { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; }
  .add-ex-btn { font-size: 12px; color: var(--accent); background: var(--accent-dim); border: none; border-radius: 20px; padding: 4px 10px; cursor: pointer; font-family: 'Barlow', sans-serif; font-weight: 600; }
  .plan-ex-row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-top: 1px solid var(--border); }
  .plan-ex-name { font-size: 14px; color: var(--text); }
  .plan-ex-right { display: flex; align-items: center; gap: 8px; }
  .plan-ex-sets { font-size: 12px; color: var(--text3); }
  .edit-ex-btn { font-size: 11px; color: var(--text3); background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); padding: 3px 8px; cursor: pointer; font-family: 'Barlow', sans-serif; }
  .edit-ex-btn:active { background: var(--bg3); }

  /* ── MODAL ── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: flex-end; justify-content: center; z-index: 100; }
  .modal-backdrop.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: var(--radius) var(--radius) 0 0; padding: 24px 20px; width: 100%; max-width: 480px; }
  .modal-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.03em; margin-bottom: 16px; }
  .modal-label { font-size: 12px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; font-weight: 600; margin-bottom: 5px; }
  .modal-input { width: 100%; padding: 11px 14px; background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 16px; outline: none; margin-bottom: 14px; }
  .modal-input:focus { border-color: var(--accent); }
  .modal-row { display: flex; gap: 10px; margin-top: 6px; }
  .modal-cancel { flex: 1; padding: 12px; background: none; border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text2); font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; }
  .modal-save { flex: 2; padding: 12px; background: var(--accent); border: none; border-radius: var(--radius-sm); color: var(--accent-text); font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; }
  .modal-delete { flex: 1; padding: 12px; background: var(--danger-dim); border: 1px solid transparent; border-radius: var(--radius-sm); color: var(--danger); font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; cursor: pointer; }
</style>
</head>
<body>
<div id="app">
  <nav class="nav">
    <button class="nav-btn active" id="tab-workouts" onclick="showTab('workouts')">Workouts</button>
    <button class="nav-btn" id="tab-history" onclick="showTab('history')">History</button>
    <button class="nav-btn" id="tab-plan" onclick="showTab('plan')">Edit Plan</button>
  </nav>

  <!-- WORKOUTS TAB -->
  <div class="screen active" id="screen-workouts">
    <div id="workouts-home">
      <div class="page-title" style="margin-top:4px">Today's Lift</div>
      <div class="page-sub">Select a workout to begin</div>
      <div id="day-cards"></div>
    </div>
    <div id="active-workout" style="display:none">
      <div class="workout-header">
        <button class="back-btn" onclick="exitWorkout()">← Back</button>
        <div class="workout-title" id="workout-day-title"></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-row">
          <span class="progress-label">Progress</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
      </div>
      <div id="exercise-list"></div>
      <button class="finish-btn" onclick="finishWorkout()">Finish Workout</button>
    </div>
    <div id="done-screen" style="display:none"></div>
  </div>

  <!-- HISTORY TAB -->
  <div class="screen" id="screen-history">
    <div class="page-title" style="margin-top:4px">History</div>
    <div class="page-sub" id="history-sub"></div>
    <div id="history-list"></div>
  </div>

  <!-- EDIT PLAN TAB -->
  <div class="screen" id="screen-plan">
    <div class="page-title" style="margin-top:4px">Edit Plan</div>
    <div class="page-sub">Customize exercises and set counts</div>
    <div id="plan-list"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-backdrop" id="modal-backdrop" onclick="onBackdropClick(event)">
  <div class="modal" id="modal">
    <div class="modal-title" id="modal-title">Add Exercise</div>
    <div class="modal-label">Exercise name</div>
    <input class="modal-input" type="text" id="modal-name" placeholder="e.g. Bench Press">
    <div class="modal-label">Sets</div>
    <input class="modal-input" type="number" id="modal-sets" inputmode="numeric" min="1" max="10" placeholder="3" style="width:100px">
    <div class="modal-row">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-delete" id="modal-delete-btn" style="display:none" onclick="modalDelete()">Delete</button>
      <button class="modal-save" onclick="modalSave()">Save</button>
    </div>
  </div>
</div>

<script>
// ── DEFAULT PLAN ──────────────────────────────────────────────────────
const DEFAULT_PLAN = [
  { id:'push', name:'Push', exercises:[
    {id:'chest_press',      name:'Chest Press',             sets:4},
    {id:'incline_plate',    name:'Incline Plate Press',     sets:3},
    {id:'shoulder_press',   name:'Shoulder Press',          sets:3},
    {id:'lateral_raise_mc', name:'Lateral Raise Machine',   sets:3},
    {id:'tricep_pd',        name:'Tricep Pushdown',         sets:3},
  ]},
  { id:'pull', name:'Pull', exercises:[
    {id:'plate_row',     name:'Plate Row',          sets:4},
    {id:'lat_pulldown',  name:'Lat Pulldown',       sets:3},
    {id:'high_iso_row',  name:'High Row / Iso Row', sets:3},
    {id:'rear_delt_mc',  name:'Rear Delt Machine',  sets:3},
    {id:'bicep_curl',    name:'Bicep Curl',         sets:3},
  ]},
  { id:'legs', name:'Legs', exercises:[
    {id:'hack_squat',    name:'Hack Squat',     sets:4},
    {id:'leg_press',     name:'Leg Press',      sets:3},
    {id:'leg_curl',      name:'Leg Curl',       sets:4},
    {id:'hip_thrust',    name:'Hip Thrust',     sets:3},
    {id:'leg_extension', name:'Leg Extension',  sets:3},
    {id:'calf_raise',    name:'Calf Raise',     sets:4},
  ]},
];

// ── STORAGE ───────────────────────────────────────────────────────────
function load(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch(e) { return fallback; }
}
function save(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

let plan        = load('wt_plan', DEFAULT_PLAN);
let lastWeights = load('wt_lastWeights', {});
let history     = load('wt_history', []);

// ── ACTIVE WORKOUT STATE ──────────────────────────────────────────────
let activeDay   = null;
let currentSets = {};  // { exId: [{weight, reps, done}] }

// ── TABS ──────────────────────────────────────────────────────────────
let currentTab = 'workouts';

function showTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + tab).classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'workouts')  renderHome();
  if (tab === 'history')   renderHistory();
  if (tab === 'plan')      renderPlan();
}

// ── HOME / DAY CARDS ─────────────────────────────────────────────────
function renderHome() {
  const el = document.getElementById('day-cards');
  el.innerHTML = plan.map(day => {
    const lastEntry = history.find(h => h.dayId === day.id);
    const lastStr   = lastEntry ? 'Last: ' + formatDate(lastEntry.timestamp) : 'No sessions yet';
    return `<div class="day-card" onclick="startWorkout('${day.id}')">
      <div class="day-card-left">
        <div class="day-card-name">${day.name} Day</div>
        <div class="day-card-exercises">${day.exercises.map(e => e.name).join(' · ')}</div>
        <div class="day-card-meta">${lastStr}</div>
      </div>
      <div class="arrow">›</div>
    </div>`;
  }).join('');
}

// ── START WORKOUT ─────────────────────────────────────────────────────
function startWorkout(dayId) {
  activeDay = plan.find(d => d.id === dayId);
  if (!activeDay) return;
  currentSets = {};
  activeDay.exercises.forEach(ex => {
    const lw   = lastWeights[ex.id] || [];
    const nums = lw.map(Number).filter(n => !isNaN(n) && n > 0);
    const best = nums.length ? String(Math.max(...nums)) : '';
    currentSets[ex.id] = Array.from({length: ex.sets}, (_, i) => ({
      weight: i === 0 ? best : '',
      reps: '',
      done: false,
    }));
  });
  document.getElementById('workouts-home').style.display   = 'none';
  document.getElementById('active-workout').style.display  = 'block';
  document.getElementById('done-screen').style.display     = 'none';
  document.getElementById('workout-day-title').textContent = activeDay.name + ' Day';
  renderExercises();
  updateProgress();
}

function exitWorkout() {
  if (Object.values(currentSets).some(sets => sets.some(s => s.done))) {
    if (!confirm('Exit workout? Progress will be lost.')) return;
  }
  document.getElementById('workouts-home').style.display  = 'block';
  document.getElementById('active-workout').style.display = 'none';
  activeDay = null; currentSets = {};
  renderHome();
}

// ── RENDER EXERCISES ─────────────────────────────────────────────────
function renderExercises() {
  const list = document.getElementById('exercise-list');
  if (!activeDay) return;
  list.innerHTML = activeDay.exercises.map(ex => {
    const sets = currentSets[ex.id] || [];
    const allDone = sets.length > 0 && sets.every(s => s.done);
    return `<div class="ex-card${allDone ? ' all-done' : ''}" id="excard-${ex.id}">
      <div class="ex-card-header">
        <div class="ex-card-name">${ex.name}</div>
        ${allDone ? '<span class="done-badge">✓ Done</span>' : ''}
      </div>
      <div class="sets-header">
        <span>Set</span><span>Weight (lbs)</span><span>Reps</span><span></span>
      </div>
      ${sets.map((s, i) => `
        <div class="set-row" id="setrow-${ex.id}-${i}">
          <div class="set-num">${i + 1}</div>
          <input class="set-input${s.done ? ' done-input' : ''}" type="number" inputmode="decimal"
            placeholder="lbs" value="${s.weight}"
            onchange="updateSet('${ex.id}',${i},'weight',this.value)"
            oninput="updateSet('${ex.id}',${i},'weight',this.value)">
          <input class="set-input${s.done ? ' done-input' : ''}" type="number" inputmode="numeric"
            placeholder="reps" value="${s.reps}"
            onchange="updateSet('${ex.id}',${i},'reps',this.value)"
            oninput="updateSet('${ex.id}',${i},'reps',this.value)">
          <button class="check-btn${s.done ? ' done' : ''}" onclick="toggleDone('${ex.id}',${i})">✓</button>
        </div>`).join('')}
    </div>`;
  }).join('');
}

function updateSet(exId, i, field, val) {
  if (currentSets[exId] && currentSets[exId][i]) {
    currentSets[exId][i][field] = val;
  }
}

function toggleDone(exId, i) {
  if (!currentSets[exId]) return;
  currentSets[exId][i].done = !currentSets[exId][i].done;
  // Sync input values into state before re-render
  document.querySelectorAll(`#setrow-${exId}-${i} .set-input`).forEach((inp, fi) => {
    currentSets[exId][i][fi === 0 ? 'weight' : 'reps'] = inp.value;
  });
  renderExercises();
  updateProgress();
}

function updateProgress() {
  if (!activeDay) return;
  let total = 0, done = 0;
  activeDay.exercises.forEach(ex => {
    (currentSets[ex.id] || []).forEach(s => { total++; if (s.done) done++; });
  });
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-pct').textContent  = pct + '%';
  document.getElementById('progress-fill').style.width = pct + '%';
}

// ── FINISH WORKOUT ────────────────────────────────────────────────────
function finishWorkout() {
  // Sync any un-toggled inputs from DOM
  activeDay.exercises.forEach(ex => {
    document.querySelectorAll(`[id^="setrow-${ex.id}-"]`).forEach(row => {
      const idx = parseInt(row.id.split('-').pop());
      const inputs = row.querySelectorAll('.set-input');
      if (inputs[0]) currentSets[ex.id][idx].weight = inputs[0].value;
      if (inputs[1]) currentSets[ex.id][idx].reps   = inputs[1].value;
    });
  });

  const timestamp = new Date().toISOString();
  const summary = {};
  activeDay.exercises.forEach(ex => {
    summary[ex.id] = currentSets[ex.id].map(s => ({weight: s.weight, reps: s.reps}));
    lastWeights[ex.id] = currentSets[ex.id].map(s => s.weight);
  });

  const entry = { dayId: activeDay.id, dayName: activeDay.name, timestamp, summary };
  history.unshift(entry);
  if (history.length > 100) history = history.slice(0, 100);

  save('wt_lastWeights', lastWeights);
  save('wt_history', history);

  renderDoneScreen(entry);
  document.getElementById('active-workout').style.display = 'none';
  document.getElementById('done-screen').style.display    = 'block';
}

function renderDoneScreen(entry) {
  const day = plan.find(d => d.id === entry.dayId);
  const doneEl = document.getElementById('done-screen');

  let summaryHTML = '';
  if (day) {
    day.exercises.forEach(ex => {
      const sets = (entry.summary[ex.id] || []).filter(s => s.weight || s.reps);
      if (!sets.length) return;
      summaryHTML += `<div class="summary-card">
        <div class="summary-ex-name">${ex.name}</div>
        <div class="summary-sets">
          ${sets.map((s,i) => `<span class="summary-set-pill">Set ${i+1}: ${s.weight||'—'} lbs × ${s.reps||'—'}</span>`).join('')}
        </div>
      </div>`;
    });
  }

  doneEl.innerHTML = `
    <div class="done-hero">
      <div class="done-icon">🏆</div>
      <div class="done-title">${entry.dayName} Day Complete!</div>
      <div class="done-sub">${formatDate(entry.timestamp)} at ${formatTime(entry.timestamp)}</div>
    </div>
    <div class="summary-label">Session Summary</div>
    ${summaryHTML}
    <button class="home-btn" onclick="returnHome()">← Back to Home</button>`;
}

function returnHome() {
  document.getElementById('done-screen').style.display    = 'none';
  document.getElementById('workouts-home').style.display  = 'block';
  activeDay = null; currentSets = {};
  renderHome();
}

// ── HISTORY ───────────────────────────────────────────────────────────
function renderHistory() {
  const sub  = document.getElementById('history-sub');
  const list = document.getElementById('history-list');
  sub.textContent = history.length + ' session' + (history.length !== 1 ? 's' : '') + ' logged';

  if (!history.length) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">No workouts logged yet.<br>Complete your first session!</div></div>`;
    return;
  }

  list.innerHTML = history.slice(0, 30).map(entry => {
    const day = plan.find(d => d.id === entry.dayId);
    let exRows = '';
    if (day) {
      day.exercises.forEach(ex => {
        const sets = (entry.summary[ex.id] || []).filter(s => s.weight || s.reps);
        if (!sets.length) return;
        exRows += `<div class="history-ex-row">
          <span class="history-ex-name">${ex.name}</span>
          <span class="history-ex-sets">${sets.map(s => `${s.weight||'—'} × ${s.reps||'—'}`).join('  ')}</span>
        </div>`;
      });
    }
    return `<div class="history-entry">
      <div class="history-header">
        <div class="history-day">${entry.dayName} Day</div>
        <div class="history-date">${formatDate(entry.timestamp)}<br>${formatTime(entry.timestamp)}</div>
      </div>
      ${exRows}
    </div>`;
  }).join('');
}

// ── EDIT PLAN ─────────────────────────────────────────────────────────
function renderPlan() {
  document.getElementById('plan-list').innerHTML = plan.map(day => `
    <div class="plan-day-card">
      <div class="plan-day-header">
        <div class="plan-day-name">${day.name} Day</div>
        <button class="add-ex-btn" onclick="openAddModal('${day.id}')">+ Add Exercise</button>
      </div>
      ${day.exercises.map(ex => `
        <div class="plan-ex-row">
          <div class="plan-ex-name">${ex.name}</div>
          <div class="plan-ex-right">
            <span class="plan-ex-sets">${ex.sets} sets</span>
            <button class="edit-ex-btn" onclick="openEditModal('${day.id}','${ex.id}')">Edit</button>
          </div>
        </div>`).join('')}
    </div>`).join('');
}

// ── MODAL ─────────────────────────────────────────────────────────────
let modalMode = null;
let modalCtx  = {};

function openAddModal(dayId) {
  modalMode = 'add';
  modalCtx  = { dayId };
  document.getElementById('modal-title').textContent      = 'Add Exercise';
  document.getElementById('modal-name').value             = '';
  document.getElementById('modal-sets').value             = '3';
  document.getElementById('modal-delete-btn').style.display = 'none';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}

function openEditModal(dayId, exId) {
  const day = plan.find(d => d.id === dayId);
  const ex  = day && day.exercises.find(e => e.id === exId);
  if (!ex) return;
  modalMode = 'edit';
  modalCtx  = { dayId, exId };
  document.getElementById('modal-title').textContent        = 'Edit Exercise';
  document.getElementById('modal-name').value               = ex.name;
  document.getElementById('modal-sets').value               = ex.sets;
  document.getElementById('modal-delete-btn').style.display = 'inline-block';
  document.getElementById('modal-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('modal-name').focus(), 100);
}

function closeModal() {
  document.getElementById('modal-backdrop').classList.remove('open');
  modalMode = null; modalCtx = {};
}

function onBackdropClick(e) {
  if (e.target === document.getElementById('modal-backdrop')) closeModal();
}

function modalSave() {
  const name = document.getElementById('modal-name').value.trim();
  const sets = Math.min(10, Math.max(1, parseInt(document.getElementById('modal-sets').value) || 3));
  if (!name) { document.getElementById('modal-name').focus(); return; }

  if (modalMode === 'add') {
    const day = plan.find(d => d.id === modalCtx.dayId);
    if (!day) return;
    const id = name.toLowerCase().replace(/[^a-z0-9]/g, '_') + '_' + Date.now();
    day.exercises.push({ id, name, sets });
  } else if (modalMode === 'edit') {
    const day = plan.find(d => d.id === modalCtx.dayId);
    const ex  = day && day.exercises.find(e => e.id === modalCtx.exId);
    if (ex) { ex.name = name; ex.sets = sets; }
  }
  save('wt_plan', plan);
  closeModal();
  renderPlan();
}

function modalDelete() {
  if (!confirm('Delete this exercise?')) return;
  const day = plan.find(d => d.id === modalCtx.dayId);
  if (day) day.exercises = day.exercises.filter(e => e.id !== modalCtx.exId);
  save('wt_plan', plan);
  closeModal();
  renderPlan();
}

// Handle Enter key in modal
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('modal-backdrop').classList.contains('open')) modalSave();
  if (e.key === 'Escape' && document.getElementById('modal-backdrop').classList.contains('open')) closeModal();
});

// ── UTILS ─────────────────────────────────────────────────────────────
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'});
}
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit'});
}

// ── INIT ──────────────────────────────────────────────────────────────
renderHome();
</script>
</body>
</html>
